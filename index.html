<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Money Stream Simulator</title>

<style>
body {
    margin: 0;
    font-family: Consolas, monospace;
    background: radial-gradient(circle at center, #0a0a0a, #000);
    color: white;
    overflow: hidden;
}

.container {
    text-align: center;
    margin-top: 100px;
}

h1 {
    font-size: 50px;
    color: #00ff88;
    text-shadow: 0 0 20px #00ff88;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #00ff88; }
    to { text-shadow: 0 0 40px #00ff88; }
}

.desc {
    font-size: 18px;
    margin: 20px;
    opacity: 0.8;
}

.features {
    margin-top: 30px;
    line-height: 1.8;
}

.btn {
    display: inline-block;
    margin-top: 40px;
    padding: 20px 40px;
    font-size: 20px;
    color: black;
    background: #00ff88;
    border-radius: 10px;
    text-decoration: none;
    transition: 0.2s;
    box-shadow: 0 0 20px #00ff88;
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 50px #00ff88;
}

#downloads {
    margin-top: 20px;
    font-size: 24px;
    color: #00ff88;
    text-shadow: 0 0 15px #00ff88;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { opacity: 0.7; }
    50% { opacity: 1; }
    100% { opacity: 0.7; }
}

.particles span {
    position: absolute;
    color: #00ff88;
    font-size: 12px;
    animation: fall linear infinite;
}

@keyframes fall {
    from { transform: translateY(-100px); opacity: 1; }
    to { transform: translateY(100vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">
    <h1>💸 MONEY STREAM SIMULATOR</h1>

    <div class="desc">
        Symulator streama z donatami, chatem i rosnącą kasą jak pojebane 💀
    </div>

    <div class="features">
        ✔ Smooth licznik kasy<br>
        ✔ Fake chat spam<br>
        ✔ Donaty + leaderboard<br>
        ✔ Efekty wizualne<br>
        ✔ Zapisywanie progresu
    </div>

    <a class="btn" href="money-sim.zip" download="MoneyStreamSimulator.zip">
        Pobierz teraz
    </a>

    <div id="downloads">Pobrania: 0</div>
</div>

<div class="particles" id="particles"></div>

<script>
const container = document.getElementById("particles");

function spawn() {
    const el = document.createElement("span");
    el.innerText = "$";
    el.style.left = Math.random() * window.innerWidth + "px";
    el.style.animationDuration = (2 + Math.random() * 3) + "s";
    container.appendChild(el);

    setTimeout(() => el.remove(), 5000);
}

setInterval(spawn, 80);

// -------- DOWNLOAD COUNTER --------

let count = localStorage.getItem("downloads");

if (!count) {
    count = Math.floor(500 + Math.random() * 2000);
}

count = parseInt(count);

const el = document.getElementById("downloads");

function animateTo(target) {
    let current = 0;

    const interval = setInterval(() => {
        current += Math.ceil((target - current) / 10);
        el.innerText = "Pobrania: " + current.toLocaleString();

        if (current >= target) {
            el.innerText = "Pobrania: " + target.toLocaleString();
            clearInterval(interval);
        }
    }, 25);
}

animateTo(count);

document.querySelector(".btn").addEventListener("click", () => {
    let gain = Math.floor(1 + Math.random() * 5);
    count += gain;

    localStorage.setItem("downloads", count);
    animateTo(count);
});
</script>

</body>
</html>
