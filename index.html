<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Money Stream Simulator</title>

<style>
body {
    margin: 0;
    font-family: Consolas, monospace;
    background: radial-gradient(circle at center, #0a0a0a, #000);
    color: white;
    overflow: hidden;
}

.container {
    text-align: center;
    margin-top: 100px;
}

h1 {
    font-size: 50px;
    color: #00ff88;
    text-shadow: 0 0 20px #00ff88;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #00ff88; }
    to { text-shadow: 0 0 40px #00ff88; }
}

.desc {
    font-size: 18px;
    margin: 20px;
    opacity: 0.8;
}

.features {
    margin-top: 30px;
    line-height: 1.8;
}

.btn {
    display: inline-block;
    margin-top: 40px;
    padding: 20px 40px;
    font-size: 20px;
    color: black;
    background: #00ff88;
    border-radius: 10px;
    text-decoration: none;
    transition: 0.2s;
    box-shadow: 0 0 20px #00ff88;
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 50px #00ff88;
}

.particles span {
    position: absolute;
    color: #00ff88;
    font-size: 12px;
    animation: fall linear infinite;
}

@keyframes fall {
    from { transform: translateY(-100px); opacity: 1; }
    to { transform: translateY(100vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">
    <h1>💸 MONEY STREAM SIMULATOR</h1>

    <div class="desc">
        Symulator streama z donatami, chatem i rosnącą kasą jak pojebane 💀
    </div>

    <div class="features">
        ✔ Smooth licznik kasy<br>
        ✔ Fake chat spam<br>
        ✔ Donaty + leaderboard<br>
        ✔ Efekty wizualne<br>
        ✔ Zapisywanie progresu
    </div>

    <a class="btn" href="program.exe" download>Pobierz teraz</a>
</div>

<div class="particles" id="particles"></div>

<script>
const container = document.getElementById("particles");

function spawn() {
    const el = document.createElement("span");
    el.innerText = "$";
    el.style.left = Math.random() * window.innerWidth + "px";
    el.style.animationDuration = (2 + Math.random() * 3) + "s";
    container.appendChild(el);

    setTimeout(() => el.remove(), 5000);
}

setInterval(spawn, 100);
</script>

</body>
</html>
