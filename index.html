<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Money Stream Simulator</title>

<style>
body {
    margin: 0;
    font-family: Consolas, monospace;
    background: radial-gradient(circle at center, #0a0a0a, #000);
    color: white;
    overflow: hidden;
}

.container {
    text-align: center;
    margin-top: 100px;
}

h1 {
    font-size: 50px;
    color: #00ff88;
    text-shadow: 0 0 20px #00ff88;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #00ff88; }
    to { text-shadow: 0 0 40px #00ff88; }
}

.desc {
    font-size: 18px;
    margin: 20px;
    opacity: 0.8;
}

.features {
    margin-top: 30px;
    line-height: 1.8;
}

.btn {
    display: inline-block;
    margin-top: 40px;
    padding: 20px 40px;
    font-size: 20px;
    color: black;
    background: #00ff88;
    border-radius: 10px;
    text-decoration: none;
    transition: 0.2s;
    box-shadow: 0 0 20px #00ff88;
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 50px #00ff88;
}

#downloads {
    margin-top: 20px;
    font-size: 24px;
    color: #00ff88;
    text-shadow: 0 0 15px #00ff88;
}

#live {
    margin-top: 10px;
    font-size: 18px;
    color: #ff5555;
    text-shadow: 0 0 10px red;
}

#popup-container {
    position: fixed;
    bottom: 10px;
    left: 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    pointer-events: none;
}

.popup {
    background: rgba(0, 255, 136, 0.1);
    border: 1px solid #00ff88;
    color: #00ff88;
    padding: 10px 15px;
    font-size: 14px;
    border-radius: 8px;
    backdrop-filter: blur(5px);
    animation: slideIn 0.4s forwards, fadeOut 0.5s forwards 3s;
    transform: translateX(-120%);
}

@keyframes slideIn {
    to { transform: translateX(0); }
}

@keyframes fadeOut {
    to { opacity: 0; transform: translateX(-120%); }
}

.particles span {
    position: absolute;
    color: #00ff88;
    font-size: 12px;
    animation: fall linear infinite;
}

@keyframes fall {
    from { transform: translateY(-100px); opacity: 1; }
    to { transform: translateY(100vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">
    <h1>💸 MONEY STREAM SIMULATOR</h1>

    <div class="desc">
        Symulator streama z donatami i live kasą 💀
    </div>

    <div class="features">
        ✔ Live downloads counter<br>
        ✔ Fake popup spam<br>
        ✔ Smooth kasa system<br>
        ✔ Efekty wizualne<br>
    </div>

    <a class="btn" href="latwogagn.zip" download="MoneyStreamSimulator.zip">
        Pobierz teraz
    </a>

    <div id="downloads">Pobrania: 0</div>
    <div id="live">LIVE downloads: 0</div>
</div>

<div id="popup-container"></div>
<div class="particles" id="particles"></div>

<script>
const popupContainer = document.getElementById("popup-container");

// ---------------- DOWNLOADS ----------------

let count = localStorage.getItem("downloads");
if (count === null) count = 500;
count = parseInt(count);

const el = document.getElementById("downloads");
const live = document.getElementById("live");

function animateTo(target) {
    let current = 0;

    const interval = setInterval(() => {
        current += Math.ceil((target - current) / 10);
        el.innerText = "Pobrania: " + current.toLocaleString();

        if (current >= target) {
            el.innerText = "Pobrania: " + target.toLocaleString();
            clearInterval(interval);
        }
    }, 25);
}

animateTo(count);

// live fake growth 💀
setInterval(() => {
    let gain = Math.floor(Math.random() * 3);
    count += gain;

    localStorage.setItem("downloads", count);

    el.innerText = "Pobrania: " + count.toLocaleString();
    live.innerText = "LIVE downloads: +" + gain;
}, 2000);

// ---------------- BUTTON ----------------

document.querySelector(".btn").addEventListener("click", () => {
    let gain = Math.floor(1 + Math.random() * 5);
    count += gain;

    localStorage.setItem("downloads", count);
    animateTo(count);
});

// ---------------- POPUPS ----------------

const names = ["Kacper123","SigmaBoy","NoScope","CryptoKing","UserX"];

function spawnPopup() {
    const el = document.createElement("div");
    el.className = "popup";

    const name = names[Math.floor(Math.random() * names.length)];
    const amount = Math.floor(1 + Math.random() * 5);

    el.innerText = name + " just downloaded (" + amount + ")";

    popupContainer.appendChild(el);

    setTimeout(() => el.remove(), 3500);
}

setInterval(spawnPopup, 700);

// ---------------- PARTICLES ----------------

const container = document.getElementById("particles");

function spawn() {
    const el = document.createElement("span");
    el.innerText = "$";
    el.style.left = Math.random() * window.innerWidth + "px";
    el.style.animationDuration = (2 + Math.random() * 3) + "s";
    container.appendChild(el);

    setTimeout(() => el.remove(), 5000);
}

setInterval(spawn, 80);
</script>

</body>
</html>
