<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Money Stream Live</title>

<style>
body {
    margin: 0;
    font-family: Consolas, monospace;
    background: radial-gradient(circle at center, #0a0a0a, #000);
    color: white;
    overflow: hidden;
}

.container {
    text-align: center;
    margin-top: 90px;
}

h1 {
    font-size: 50px;
    color: #00ff88;
    text-shadow: 0 0 20px #00ff88;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #00ff88; }
    to { text-shadow: 0 0 40px #00ff88; }
}

.desc {
    font-size: 18px;
    margin: 20px;
    opacity: 0.8;
}

.btn {
    display: inline-block;
    margin-top: 40px;
    padding: 20px 40px;
    font-size: 20px;
    color: black;
    background: #00ff88;
    border-radius: 10px;
    text-decoration: none;
    box-shadow: 0 0 20px #00ff88;
    transition: 0.2s;
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 50px #00ff88;
}

#downloads {
    margin-top: 20px;
    font-size: 24px;
    color: #00ff88;
    text-shadow: 0 0 15px #00ff88;
}

#views {
    margin-top: 10px;
    font-size: 20px;
    color: #ff4444;
    text-shadow: 0 0 10px red;
}

#popup-container {
    position: fixed;
    bottom: 10px;
    left: 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    pointer-events: none;
}

.popup {
    background: rgba(0, 255, 136, 0.1);
    border: 1px solid #00ff88;
    color: #00ff88;
    padding: 10px 15px;
    font-size: 14px;
    border-radius: 8px;
    backdrop-filter: blur(5px);
    animation: slideIn 0.4s forwards, fadeOut 0.5s forwards 3s;
    transform: translateX(-120%);
}

@keyframes slideIn {
    to { transform: translateX(0); }
}

@keyframes fadeOut {
    to { opacity: 0; transform: translateX(-120%); }
}
</style>
</head>

<body>

<div class="container">
    <h1>💸 MONEY STREAM LIVE</h1>

    <div class="desc">
        Live fake dashboard z pobraniami i widzami
    </div>

    <a class="btn"
        href="https://pindoza.github.io/latwopyproject/latwogagn.zip"
        download="MoneyStreamSimulator.zip">
        Pobierz teraz
    </a>

    <div id="downloads">Pobrania: 0</div>
    <div id="views">👀 Oglądajacy online: 0</div>
    <div id="peakviews" style="color:#ff8800; text-shadow:0 0 10px #ff8800;">
        🤔 W peak'u osób było: 1,6 miliona oglądających 🫣
    </div>
</div>

<div id="popup-container"></div>

<script>
const popupContainer = document.getElementById("popup-container");

// ---------------- DOWNLOADS ----------------

let count = localStorage.getItem("downloads");
if (count === null) count = 500;
count = parseInt(count);

const downloadsEl = document.getElementById("downloads");
const viewsEl = document.getElementById("views");

// smooth start
function animateTo(target) {
    let current = 0;

    const interval = setInterval(() => {
        current += Math.ceil((target - current) / 10);
        downloadsEl.innerText = "Pobrania: " + current.toLocaleString();

        if (current >= target) clearInterval(interval);
    }, 25);
}

animateTo(count);

// live updates
setInterval(() => {
    let gain = Math.floor(Math.random() * 4);
    count += gain;

    localStorage.setItem("downloads", count);

    downloadsEl.innerText = "Pobrania: " + count.toLocaleString();
}, 2000);

// ---------------- VIEWERS ----------------

let viewers = 750000 + Math.floor(Math.random() * 50000);
    
function updateViewers() {
    let change = Math.floor(Math.random() * 200 - 100);
    viewers += change;

    if (viewers < 5000) viewers = 5000;

    viewsEl.innerText = "👀 Viewers online: " + viewers.toLocaleString();
}

setInterval(updateViewers, 1500);

// ---------------- BUTTON ----------------

document.querySelector(".btn").addEventListener("click", () => {
    let gain = Math.floor(1 + Math.random() * 5);
    count += gain;

    localStorage.setItem("downloads", count);
    downloadsEl.innerText = "Pobrania: " + count.toLocaleString();
});

// ---------------- POPUPS ----------------

function spawnPopup() {
    const el = document.createElement("div");
    el.className = "popup";

    el.innerText = "Ktoś właśnie pobrał project";

    popupContainer.appendChild(el);

    setTimeout(() => el.remove(), 3500);
}

setInterval(spawnPopup, 800);
</script>

</body>
</html>
